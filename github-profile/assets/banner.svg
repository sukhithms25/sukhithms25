<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" fill="none">
  <style>
    .title { font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace; font-weight: bold; font-size: 14px; fill: #00f0ff; }
    .window-header { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .window-body { fill: #0b0e14; stroke: #30363d; stroke-width: 1; }
    .btn-red { fill: #ff5f56; }
    .btn-yellow { fill: #ffbd2e; }
    .btn-green { fill: #27c93f; }
    .terminal-text { font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace; font-size: 12px; fill: #c9d1d9; }
    .accent { fill: #00f0ff; }
    .accent-dim { fill: #30363d; }
  </style>
  
  <!-- Outer Window -->
  <rect x="5" y="5" width="790" height="190" rx="8" class="window-body" />
  
  <!-- Window Title Bar -->
  <path d="M5 13C5 8.58172 8.58172 5 13 5H787C791.418 5 795 8.58172 795 13V35H5V13Z" class="window-header" />
  
  <!-- Window Buttons -->
  <circle cx="25" cy="20" r="6" class="btn-red" />
  <circle cx="45" cy="20" r="6" class="btn-yellow" />
  <circle cx="65" cy="20" r="6" class="btn-green" />
  
  <!-- Header Title -->
  <text x="400" y="25" text-anchor="middle" class="title">[SPECTER: CORE-OS v0.1.0-alpha]</text>
  
  <!-- Terminal Content -->
  <text x="30" y="70" class="terminal-text"><tspan class="accent">guest@specter:~$</tspan> neofetch</text>
  
  <!-- Neofetch Mockup -->
  <!-- Left Side: ASCII Logo -->
  <text x="30" y="95" class="terminal-text" font-size="11" fill="#00f0ff">
    <tspan x="30" dy="0">   /\___/\   </tspan>
    <tspan x="30" dy="15">  (  o o  )  </tspan>
    <tspan x="30" dy="15">  (  =^=  )  </tspan>
    <tspan x="30" dy="15">   (______)  </tspan>
  </text>
  
  <!-- Right Side: System Info -->
  <text x="180" y="95" class="terminal-text" font-size="12">
    <tspan x="180" dy="0"><tspan fill="#58a6ff" font-weight="bold">Host</tspan>: Sukhith M S</tspan>
    <tspan x="180" dy="16"><tspan fill="#58a6ff" font-weight="bold">Role</tspan>: AI Systems Engineer</tspan>
    <tspan x="180" dy="16"><tspan fill="#58a6ff" font-weight="bold">Project</tspan>: ULTRON (Specter Personal OS)</tspan>
    <tspan x="180" dy="16"><tspan fill="#58a6ff" font-weight="bold">Status</tspan>: Active [Local Ollama Backend]</tspan>
    <tspan x="180" dy="16"><tspan fill="#58a6ff" font-weight="bold">Shell</tspan>: python-cognitive-runtime</tspan>
  </text>
  
  <!-- Terminal Bottom bar decoration -->
  <rect x="15" y="175" width="770" height="2" class="accent-dim" />
  <circle cx="780" cy="176" r="3" class="accent" />
</svg>
